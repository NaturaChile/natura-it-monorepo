name: GSP Bot v5 - Deploy Docker (Manual)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a ejecutar'
        required: true
        type: choice
        options:
          - deploy
          - stop
          - restart
          - status
          - logs
          - login-stress
          - empty-cart
      scale_workers:
        description: 'Cantidad de workers Playwright (solo deploy/restart)'
        required: false
        default: '3'
        type: string

jobs:
  gsp-docker:
    name: "GSP v5 - ${{ github.event.inputs.action }}"
    runs-on: [self-hosted, Windows, X64, self-hosted-ml]
    environment: Machine_Learning_10.224.6.16

    # ══════════════════════════════════════════════════════════
    # Patrón estándar del monorepo: TODAS las variables se 
    #inyectan via env: block. Docker Compose las hereda del
    # environment del proceso padre (el runner).
    # ══════════════════════════════════════════════════════════
    env:
      COMPOSE_DIR: rpa_headless_linux/gsp_v5

      # DOCKER_HOST se detecta dinamicamente en el paso "Verificar Docker WSL2"
      # y se exporta via GITHUB_ENV (puede ser localhost o IP de WSL2)

      # --- Credenciales GSP (SECRETS) ---
      GSP_USER_CODE: ${{ secrets.GSP_USER_CODE }}
      GSP_PASSWORD: ${{ secrets.GSP_PASSWORD }}

      # --- PostgreSQL (SECRET) ---
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      # --- Flower Dashboard (SECRET) ---
      FLOWER_BASIC_AUTH: ${{ secrets.FLOWER_BASIC_AUTH }}

      # --- Redis (SECRET) ---
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      # --- Gmail OAuth2 Token (SECRET) ---
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}

      # --- Workers / Celery (VARIABLES) ---
      WORKER_COUNT: ${{ github.event.inputs.scale_workers || '3' }}
      CELERY_CONCURRENCY: ${{ vars.CELERY_CONCURRENCY || '1' }}
      CELERY_MAX_RETRIES: ${{ vars.CELERY_MAX_RETRIES || '3' }}
      CELERY_RETRY_DELAY: ${{ vars.CELERY_RETRY_DELAY || '30' }}

      # --- Playwright (VARIABLES) ---
      PLAYWRIGHT_HEADLESS: ${{ vars.PLAYWRIGHT_HEADLESS || 'true' }}
      PLAYWRIGHT_TIMEOUT: ${{ vars.PLAYWRIGHT_TIMEOUT || '60000' }}
      PLAYWRIGHT_SLOW_MO: ${{ vars.PLAYWRIGHT_SLOW_MO || '100' }}

      # --- App (VARIABLES) ---
      APP_ENV: ${{ vars.APP_ENV || 'production' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      LOG_FORMAT: ${{ vars.LOG_FORMAT || 'json' }}

    steps:
      # ── 1. Checkout ────────────────────────────
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      # ── 2. Verificar Docker (WSL2 Engine via TCP) ────────────────────
      - name: Verificar Docker WSL2 (Linux containers via TCP)
        shell: powershell
        run: |
          # 1. Despertar WSL2
          Write-Host "[1/5] Despertando WSL2 Ubuntu..."
          $p1 = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","echo","ok") -NoNewWindow -PassThru
          if (-not $p1.WaitForExit(30000)) { $p1.Kill() }
          Write-Host "[OK] WSL2 respondio"

          # 2. Detener Windows Docker Engine (puede ocupar :2375)
          Write-Host "[2/5] Deteniendo servicio Windows Docker Engine..."
          $svc = Get-Service -Name "docker" -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -eq 'Running') {
            Stop-Service docker -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
            Write-Host "[OK] Servicio Docker Windows detenido"
          } else { Write-Host "[OK] Servicio Docker Windows no estaba corriendo" }

          # 3. Matar socat (wsl.conf boot lo inicia y ocupa :2375 antes que dockerd)
          Write-Host "[3/5] Matando socat dentro de WSL2..."
          $pk = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","pkill","-9","socat") -NoNewWindow -PassThru
          if (-not $pk.WaitForExit(8000)) { $pk.Kill() }
          Start-Sleep -Seconds 2

          # 4. Restart docker para que rebindee tcp://0.0.0.0:2375 sin socat
          Write-Host "[4/5] Reiniciando docker daemon en WSL2..."
          $p3 = Start-Process wsl.exe -ArgumentList "-d Ubuntu -u root -- service docker restart" -NoNewWindow -PassThru
          if (-not $p3.WaitForExit(45000)) { $p3.Kill(); Write-Host "[WARN] docker restart timeout" }

          # Docker 29.x agrega ~1s de delay intencional por deprecation warning (TCP sin TLS)
          Write-Host "[5/5] Esperando deprecation delay de dockerd..."
          Start-Sleep -Seconds 5

          # 6. Obtener IP real de WSL2 (eth0, no docker0)
          $wslIp = (wsl -d Ubuntu -u root -- ip -4 addr show eth0 2>$null | Select-String 'inet (\d+\.\d+\.\d+\.\d+)').Matches.Groups[1].Value
          if (-not $wslIp) {
            $wslIp = (wsl -d Ubuntu -u root -- hostname -I).Trim().Split()[0]
          }
          Write-Host "[INFO] WSL2 eth0 IP: $wslIp"

          # 7. Abrir firewall Win11 Pro (Hyper-V Firewall bloquea trafico Host<->WSL2)
          Write-Host "[INFO] Configurando reglas de firewall para Docker WSL2..."
          Remove-NetFirewallRule -DisplayName "WSL2 Docker TCP" -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName "WSL2 Docker TCP" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 2375 -Profile Any -ErrorAction SilentlyContinue | Out-Null
          New-NetFirewallRule -DisplayName "WSL2 Docker TCP Out" -Direction Outbound -Action Allow -Protocol TCP -RemoteAddress $wslIp -RemotePort 2375 -Profile Any -ErrorAction SilentlyContinue | Out-Null
          if (Get-Command Set-NetFirewallHyperVVMSetting -ErrorAction SilentlyContinue) {
            Set-NetFirewallHyperVVMSetting -Name '{40E0AC32-46A5-438A-A0B2-2B479E8F2E90}' -DefaultInboundAction Allow -DefaultOutboundAction Allow -ErrorAction SilentlyContinue
            Write-Host "[OK] Hyper-V Firewall configurado para WSL2"
          } else { Write-Host "[INFO] Hyper-V Firewall cmdlet no disponible" }

          # 8. Probar conexion: primero localhost, luego IP directa de WSL2
          $dockerHost = $null
          Write-Host "[INFO] Probando tcp://localhost:2375..."
          $tcp1 = (Test-NetConnection -ComputerName 127.0.0.1 -Port 2375 -WarningAction SilentlyContinue).TcpTestSucceeded
          if ($tcp1) {
            Write-Host "[OK] localhost:2375 accesible"
            $dockerHost = "tcp://localhost:2375"
          } else {
            Write-Host "[INFO] localhost no responde. Probando tcp://${wslIp}:2375..."
            $tcp2 = (Test-NetConnection -ComputerName $wslIp -Port 2375 -WarningAction SilentlyContinue).TcpTestSucceeded
            if ($tcp2) {
              Write-Host "[OK] ${wslIp}:2375 accesible"
              $dockerHost = "tcp://${wslIp}:2375"
            } else {
              Write-Host "[INFO] IP directa tampoco responde. Forzando portproxy..."
              netsh interface portproxy delete v4tov4 listenport=2375 listenaddress=127.0.0.1 2>$null
              netsh interface portproxy add v4tov4 listenport=2375 listenaddress=127.0.0.1 connectport=2375 connectaddress=$wslIp
              Start-Sleep -Seconds 3
              $tcp3 = (Test-NetConnection -ComputerName 127.0.0.1 -Port 2375 -WarningAction SilentlyContinue).TcpTestSucceeded
              if ($tcp3) {
                Write-Host "[OK] localhost:2375 accesible via portproxy"
                $dockerHost = "tcp://localhost:2375"
              }
            }
          }

          if (-not $dockerHost) {
            Write-Host "[DIAG] pgrep dockerd:"
            wsl -d Ubuntu -u root -- pgrep -a dockerd
            Write-Host "[DIAG] ss -tlnp :2375:"
            wsl -d Ubuntu -u root -- ss -tlnp sport = :2375
            Write-Host "[DIAG] ip addr:"
            wsl -d Ubuntu -u root -- ip -4 addr
            Write-Host "[DIAG] Windows firewall rules Docker:"
            Get-NetFirewallRule -DisplayName "*Docker*" -ErrorAction SilentlyContinue | Format-Table DisplayName,Direction,Action,Enabled
            Write-Host "[DIAG] portproxy:"
            netsh interface portproxy show v4tov4
            Write-Error "[ERROR] Docker no accesible en localhost ni en $wslIp"; exit 1
          }

          # 9. Exportar DOCKER_HOST para pasos siguientes
          Write-Host "[OK] DOCKER_HOST=$dockerHost"
          echo "DOCKER_HOST=$dockerHost" >> $env:GITHUB_ENV
          $env:DOCKER_HOST = $dockerHost

          $version = cmd /c "docker version --format {{.Server.Version}} 2>NUL"
          Write-Host "[OK] Docker Engine WSL2 Linux: $version"
          $cv = cmd /c "docker compose version --short 2>NUL"
          Write-Host "[OK] Docker Compose: $cv"

      # ══════════════════════════════════════════════
      # DETECCION DE PROXY (antes de build)
      # ══════════════════════════════════════════════
      - name: "Detectar proxy corporativo del host"
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'login-stress' || github.event.inputs.action == 'empty-cart'
        id: proxy
        shell: powershell
        run: |
          Write-Host "[INFO] Detectando configuracion de proxy del host..."
          
          # 1. Buscar en variables de entorno
          $httpProxy  = $env:HTTP_PROXY
          $httpsProxy = $env:HTTPS_PROXY
          $noProxy    = $env:NO_PROXY
          
          # 2. Si no hay env vars, buscar en registro de Windows (IE/System proxy)
          if (-not $httpsProxy) {
            try {
              $reg = Get-ItemProperty -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Internet Settings' -ErrorAction Stop
              if ($reg.ProxyEnable -eq 1 -and $reg.ProxyServer) {
                $proxyServer = $reg.ProxyServer
                Write-Host "[INFO] Proxy detectado en registro de Windows: $proxyServer"
                if ($proxyServer -notmatch '^https?://') {
                  $proxyServer = "http://$proxyServer"
                }
                $httpProxy  = $proxyServer
                $httpsProxy = $proxyServer
              }
            } catch {
              Write-Host "[INFO] No se pudo leer proxy del registro."
            }
          }
          
          # 3. Tambien buscar via netsh
          if (-not $httpsProxy) {
            try {
              $netshOutput = netsh winhttp show proxy 2>$null
              $match = [regex]::Match($netshOutput, 'Proxy Server\(s\)\s*:\s*(\S+)')
              if ($match.Success) {
                $proxyAddr = $match.Groups[1].Value
                Write-Host "[INFO] Proxy detectado via netsh: $proxyAddr"
                if ($proxyAddr -notmatch '^https?://') {
                  $proxyAddr = "http://$proxyAddr"
                }
                $httpProxy  = $proxyAddr
                $httpsProxy = $proxyAddr
              }
            } catch {
              Write-Host "[INFO] No se pudo leer proxy via netsh."
            }
          }
          
          if ($httpsProxy) {
            Write-Host "[OK] Proxy configurado: $httpsProxy"
            # Exportar para pasos siguientes
            echo "HTTP_PROXY=$httpProxy" >> $env:GITHUB_ENV
            echo "HTTPS_PROXY=$httpsProxy" >> $env:GITHUB_ENV
            echo "http_proxy=$httpProxy" >> $env:GITHUB_ENV
            echo "https_proxy=$httpsProxy" >> $env:GITHUB_ENV
            if ($noProxy) {
              echo "NO_PROXY=$noProxy" >> $env:GITHUB_ENV
              echo "no_proxy=$noProxy" >> $env:GITHUB_ENV
            } else {
              echo "NO_PROXY=localhost,127.0.0.1,postgres,redis,master,dispatcher" >> $env:GITHUB_ENV
              echo "no_proxy=localhost,127.0.0.1,postgres,redis,master,dispatcher" >> $env:GITHUB_ENV
            }
            echo "PROXY_DETECTED=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "[INFO] No se detecto proxy corporativo."
            echo "PROXY_DETECTED=false" >> $env:GITHUB_ENV
          }

      # ══════════════════════════════════════════════
      # ACCION: DEPLOY (build + levantar todo)
      # ══════════════════════════════════════════════
      - name: "DEPLOY - Build de imagenes Docker"
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'login-stress' || github.event.inputs.action == 'empty-cart'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - DEPLOY"
          Write-Host "  Workers: ${{ github.event.inputs.scale_workers }}"
          Write-Host "════════════════════════════════════════"
          
          Write-Host ""
          Write-Host "[1/5] Deteniendo servicios anteriores si existen..."
          cmd /c "docker compose down --remove-orphans 2>NUL"
          
          Write-Host ""
          Write-Host "[2/5] Construyendo imagenes Docker (sin cache)..."
          $env:DOCKER_CLI_HINTS="false"
          cmd /c "docker compose build --no-cache"

      - name: "DEPLOY - Levantar infraestructura (PostgreSQL + Redis)"
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'login-stress' || github.event.inputs.action == 'empty-cart'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          # Docker Compose hereda las env vars del proceso padre (el runner).
          # Las variables definidas en el bloque env: del job YA están disponibles.
          Write-Host "[3/5] Levantando PostgreSQL y Redis..."
          docker compose up -d postgres redis
          
          Write-Host "[INFO] Esperando que los servicios esten saludables..."
          $maxWait = 60
          $elapsed = 0
          
          while ($elapsed -lt $maxWait) {
            $pgHealthy = docker inspect --format='{{.State.Health.Status}}' gsp_v5-postgres-1 2>$null
            $redisHealthy = docker inspect --format='{{.State.Health.Status}}' gsp_v5-redis-1 2>$null
            
            if ($pgHealthy -eq "healthy" -and $redisHealthy -eq "healthy") {
              Write-Host "[OK] PostgreSQL y Redis estan listos."
              break
            }
            
            Write-Host "[INFO] Esperando... (${elapsed}s) PG=$pgHealthy REDIS=$redisHealthy"
            Start-Sleep -Seconds 5
            $elapsed += 5
          }
          
          if ($elapsed -ge $maxWait) {
            Write-Host "[WARN] Timeout esperando servicios, continuando de todos modos..."
          }

      - name: "DEPLOY - Levantar servicios de aplicacion"
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'login-stress' || github.event.inputs.action == 'empty-cart'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          $workers = [int]"${{ github.event.inputs.scale_workers }}"
          
          Write-Host "[4/5] Levantando Master API, Dispatcher, Flower y $workers worker(s)..."
          
          # docker compose hereda las env vars del runner automaticamente.
          # El docker-compose.yml usa ${GSP_USER_CODE}, ${POSTGRES_PASSWORD}, etc.
          # que ya estan en el environment del proceso.
          docker compose up -d master dispatcher flower
          docker compose up -d --scale worker=$workers worker
          
          Write-Host ""
          Write-Host "[5/5] Verificando estado de servicios..."
          Start-Sleep -Seconds 10
          docker compose ps

      # ── Diagnostic: Network connectivity from inside a worker container ──
      - name: "DEPLOY - Diagnostico de red desde contenedor"
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'login-stress' || github.event.inputs.action == 'empty-cart'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          Write-Host "════════════════════════════════════════"
          Write-Host "  DIAGNOSTICO DE RED DESDE CONTENEDOR"
          Write-Host "════════════════════════════════════════"
          
          $target = "natura-auth.prd.naturacloud.com"
          
          Write-Host ""
          Write-Host "--- Proxy detectado: $env:PROXY_DETECTED ---"
          if ($env:PROXY_DETECTED -eq "true") {
            Write-Host "  HTTP_PROXY  = $env:HTTP_PROXY"
            Write-Host "  HTTPS_PROXY = $env:HTTPS_PROXY"
            Write-Host "  NO_PROXY    = $env:NO_PROXY"
          }
          
          Write-Host ""
          Write-Host "--- Test desde HOST (PowerShell) ---"
          try {
            $hostTest = Invoke-WebRequest -Uri "https://$target" -TimeoutSec 10 -UseBasicParsing -ErrorAction Stop
            Write-Host "[OK] Host puede alcanzar $target -> HTTP $($hostTest.StatusCode)"
          } catch {
            Write-Host "[WARN] Host no puede alcanzar $target : $($_.Exception.Message)"
          }
          
          Write-Host ""
          Write-Host "--- Test desde CONTENEDOR worker ---"
          
          Write-Host "[1] DNS Resolution:"
          docker compose exec -T worker python -c "import socket; ip=socket.getaddrinfo('$target',443)[0][4][0]; print(f'  [OK] DNS: $target -> '+ip)" 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "  [FAIL] DNS resolution failed" }
          
          Write-Host "[2] TCP Connection (port 443):"
          docker compose exec -T worker python -c "import socket; s=socket.create_connection(('$target',443),timeout=10); s.close(); print('  [OK] TCP: connected to $target`:443')" 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "  [FAIL] TCP connection failed" }
          
          Write-Host "[3] TLS Handshake:"
          docker compose exec -T worker python -c "import socket,ssl; ctx=ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE; s=socket.create_connection(('$target',443),timeout=10); ss=ctx.wrap_socket(s,server_hostname='$target'); print('  [OK] TLS: '+ss.version()); ss.close()" 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "  [FAIL] TLS handshake failed" }
          
          Write-Host "[4] HTTP Request (urllib):"
          docker compose exec -T worker python -c "import urllib.request,ssl,os; proxy=os.environ.get('HTTPS_PROXY') or os.environ.get('https_proxy') or 'none'; print('  Proxy in env: '+proxy); ctx=ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE; req=urllib.request.Request('https://$target',method='HEAD'); resp=urllib.request.urlopen(req,timeout=15,context=ctx); print('  [OK] HTTP: '+str(resp.status))" 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "  [FAIL] HTTP request failed" }
          
          Write-Host "[5] curl test:"
          docker compose exec -T worker curl -sSL -o /dev/null -w "  HTTP %{http_code} in %{time_total}s`n" --max-time 15 --connect-timeout 10 "https://$target" 2>&1
          
          if ($env:PROXY_DETECTED -eq "true") {
            Write-Host "[6] curl with proxy ($env:HTTPS_PROXY):"
            docker compose exec -T worker curl -sSL -o /dev/null -w "  HTTP %{http_code} in %{time_total}s`n" --proxy "$env:HTTPS_PROXY" --max-time 15 --connect-timeout 10 "https://$target" 2>&1
          }
          
          Write-Host ""
          Write-Host "--- Informacion de red del contenedor ---"
          docker compose exec -T worker cat /etc/resolv.conf 2>$null
          Write-Host ""
          docker compose exec -T worker ip route 2>$null
          Write-Host ""
          Write-Host "════════════════════════════════════════"

      - name: "DEPLOY - Verificar salud de la API"
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'login-stress' || github.event.inputs.action == 'empty-cart'
        shell: powershell
        run: |
          Write-Host "[INFO] Verificando que la API responde..."
          $maxRetries = 12
          $retry = 0
          
          while ($retry -lt $maxRetries) {
            try {
              $response = Invoke-RestMethod -Uri "http://localhost:8000/health" -TimeoutSec 5 -ErrorAction Stop
              Write-Host "[OK] API respondiendo: $($response | ConvertTo-Json -Compress)"
              
              Write-Host ""
              Write-Host "════════════════════════════════════════"
              Write-Host "  DEPLOY EXITOSO"
              Write-Host "════════════════════════════════════════"
              Write-Host ""
              Write-Host "  API REST:    http://localhost:8000"
              Write-Host "  Swagger UI:  http://localhost:8000/docs"
              Write-Host "  Flower:      http://localhost:5555"
              Write-Host "  PostgreSQL:  localhost:5432"
              Write-Host "  Redis:       localhost:6379"
              Write-Host ""
              Write-Host "  Workers:     ${{ github.event.inputs.scale_workers }}"
              Write-Host ""
              exit 0
            } catch {
              $retry++
              Write-Host "[INFO] API no responde aun... intento $retry/$maxRetries"
              Start-Sleep -Seconds 5
            }
          }
          
          Write-Host "[WARN] La API no respondio al health check, pero los contenedores pueden estar arrancando."
          Write-Host "[INFO] Verifica manualmente en http://localhost:8000/health"

      # ══════════════════════════════════════════════
      # ACCION: STOP
      # ══════════════════════════════════════════════
      - name: "STOP - Detener todos los servicios"
        if: github.event.inputs.action == 'stop'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - STOP"
          Write-Host "════════════════════════════════════════"
          
          Write-Host "[INFO] Deteniendo todos los contenedores..."
          cmd /c "docker compose down --remove-orphans 2>NUL"
          
          Write-Host ""
          Write-Host "[OK] Todos los servicios detenidos."
          Write-Host "[INFO] Los datos de PostgreSQL y Redis persisten en Docker volumes."
          Write-Host "[INFO] Para eliminar datos: docker compose down -v"

      # ══════════════════════════════════════════════
      # ACCION: RESTART
      # ══════════════════════════════════════════════
      - name: "RESTART - Reiniciar servicios"
        if: github.event.inputs.action == 'restart'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          $workers = [int]"${{ github.event.inputs.scale_workers }}"
          
          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - RESTART"
          Write-Host "  Workers: $workers"
          Write-Host "════════════════════════════════════════"
          
          Write-Host "[INFO] Deteniendo servicios..."
          cmd /c "docker compose down --remove-orphans 2>NUL"
          
          Write-Host "[INFO] Levantando servicios..."
          docker compose up -d postgres redis
          Start-Sleep -Seconds 15
          
          docker compose up -d master dispatcher flower
          docker compose up -d --scale worker=$workers worker
          
          Start-Sleep -Seconds 10
          Write-Host ""
          Write-Host "[OK] Servicios reiniciados:"
          docker compose ps

      # ══════════════════════════════════════════════
      # ACCION: STATUS
      # ══════════════════════════════════════════════
      - name: "STATUS - Estado de servicios"
        if: github.event.inputs.action == 'status'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - STATUS"
          Write-Host "════════════════════════════════════════"
          
          Write-Host ""
          Write-Host "--- Contenedores ---"
          docker compose ps -a
          
          Write-Host ""
          Write-Host "--- Uso de Recursos ---"
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}" 2>$null
          
          Write-Host ""
          Write-Host "--- Volumes ---"
          docker volume ls --filter "name=gsp" 2>$null
          
          Write-Host ""
          Write-Host "--- Health Check API ---"
          try {
            $response = Invoke-RestMethod -Uri "http://localhost:8000/health" -TimeoutSec 5 -ErrorAction Stop
            Write-Host "[OK] API: $($response | ConvertTo-Json -Compress)"
          } catch {
            Write-Host "[WARN] API no responde en http://localhost:8000/health"
          }

      # ══════════════════════════════════════════════
      # ACCION: LOGS
      # ══════════════════════════════════════════════
      - name: "LOGS - Ver logs recientes"
        if: github.event.inputs.action == 'logs'
        shell: powershell
        working-directory: ${{ env.COMPOSE_DIR }}
        run: |
          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - LOGS (ultimos 150 por servicio)"
          Write-Host "════════════════════════════════════════"
          
          Write-Host ""
          Write-Host "=== MASTER API ==="
          docker compose logs --tail=50 --timestamps master 2>$null
          
          Write-Host ""
          Write-Host "=== DISPATCHER ==="
          docker compose logs --tail=30 --timestamps dispatcher 2>$null
          
          Write-Host ""
          Write-Host "=== WORKERS ==="
          docker compose logs --tail=50 --timestamps worker 2>$null
          
          Write-Host ""
          Write-Host "=== FLOWER ==="
          docker compose logs --tail=20 --timestamps flower 2>$null

      # ══════════════════════════════════════════════
      # ACCION: LOGIN-STRESS
      # ══════════════════════════════════════════════
      - name: "LOGIN-STRESS - Test de logins concurrentes"
        if: github.event.inputs.action == 'login-stress'
        shell: powershell
        run: |
          $workers = [int]"${{ github.event.inputs.scale_workers }}"
          $concurrency = [int]"${{ vars.CELERY_CONCURRENCY || '1' }}"
          $total = $workers * $concurrency

          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - LOGIN STRESS TEST"
          Write-Host "  Workers: $workers"
          Write-Host "  Concurrency/worker: $concurrency"
          Write-Host "  Total logins: $total"
          Write-Host "════════════════════════════════════════"

          Write-Host ""
          Write-Host "[1/3] Lanzando $total logins concurrentes via API..."
          try {
            $response = Invoke-RestMethod -Method POST -Uri "http://localhost:8000/tests/login-stress" -TimeoutSec 30 -ErrorAction Stop
            Write-Host "[OK] Test lanzado:"
            $response | ConvertTo-Json -Depth 5 | Write-Host

            $taskIds = ($response.tasks | ForEach-Object { $_.task_id }) -join ","

            Write-Host ""
            Write-Host "[2/3] Esperando resultados (max 120s)..."
            $maxWait = 120
            $elapsed = 0

            while ($elapsed -lt $maxWait) {
              Start-Sleep -Seconds 10
              $elapsed += 10
              try {
                $results = Invoke-RestMethod -Uri "http://localhost:8000/tests/login-stress/results?task_ids=$taskIds" -TimeoutSec 10 -ErrorAction Stop
                $pending = $results.in_progress
                $succeeded = $results.succeeded
                $failed = $results.failed

                Write-Host "[${elapsed}s] Succeeded: $succeeded | Failed: $failed | Pending: $pending"

                if ($pending -eq 0) {
                  Write-Host ""
                  Write-Host "[3/3] Resultados finales:"
                  $results | ConvertTo-Json -Depth 5 | Write-Host
                  break
                }
              } catch {
                Write-Host "[${elapsed}s] Esperando respuesta del API..."
              }
            }

            if ($elapsed -ge $maxWait) {
              Write-Host "[WARN] Timeout alcanzado. Revisa Flower para resultados completos."
            }
          } catch {
            Write-Host "[ERROR] No se pudo conectar a la API: $($_.Exception.Message)"
            Write-Host "[INFO] Asegurate de que los servicios esten corriendo (accion: deploy)"
            exit 1
          }

      # ══════════════════════════════════════════════
      # ACCION: EMPTY-CART
      # ══════════════════════════════════════════════
      - name: "EMPTY-CART - Vaciar carritos de consultoras"
        if: github.event.inputs.action == 'empty-cart'
        shell: powershell
        run: |
          Write-Host "════════════════════════════════════════"
          Write-Host "  GSP Bot v5 - EMPTY CART"
          Write-Host "  Workers: ${{ github.event.inputs.scale_workers }}"
          Write-Host "════════════════════════════════════════"
          Write-Host ""
          Write-Host "[OK] Infraestructura desplegada correctamente."
          Write-Host ""
          Write-Host "  Para vaciar carritos, sube tu archivo CSV/Excel con la columna"
          Write-Host "  'consultora_code' desde la interfaz Swagger:"
          Write-Host ""
          Write-Host "  >> http://localhost:8000/docs#/default/upload_clear_cart_cart_clear_upload_post"
          Write-Host ""
          Write-Host "  Luego puedes consultar el progreso en:"
          Write-Host "  >> http://localhost:8000/docs#/default/get_clear_cart_results_cart_clear_results_get"
          Write-Host ""
          Write-Host "  O monitorear desde Flower:"
          Write-Host "  >> http://localhost:5555"
          Write-Host ""
          Write-Host "════════════════════════════════════════"
