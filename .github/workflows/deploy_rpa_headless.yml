name: CD - Deploy RPA Headless Linux (Dev)

# ──────────────────────────────────────────────────────────
# Despliega automáticamente los cambios de rpa_headless_linux
# en la máquina 10.224.6.16 cuando se hace push a dev.
# Patrón idéntico a deploy_windows_bots.yml pero para la
# máquina de Machine Learning con Docker.
# ──────────────────────────────────────────────────────────

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'rpa_headless_linux/**'
      - 'core_shared/**'
      - 'config/**'
      - 'requirements.txt'
      - '.github/workflows/deploy_rpa_headless.yml'

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, self-hosted-ml]

    environment: Machine_Learning_10.224.6.16

    env:
      DEPLOY_PATH: ${{ vars.WIN_DEPLOY_PATH }}

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Desplegar Archivos en Servidor
        shell: powershell
        run: |
          $dest = "$env:DEPLOY_PATH"
          Write-Host "[INFO] Iniciando despliegue RPA Headless Linux en: $dest"
          
          # 1. Crear directorio base si no existe
          if (!(Test-Path -Path $dest)) { 
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Write-Host "[OK] Directorio base creado."
          }
          
          # 2. Copiar carpetas (Sobrescribiendo)
          Write-Host "[INFO] Copiando RPA Headless Linux..."
          if (Test-Path ".\rpa_headless_linux") {
              Copy-Item -Path ".\rpa_headless_linux" -Destination $dest -Recurse -Force
          }

          Write-Host "[INFO] Copiando Core Shared..."
          Copy-Item -Path ".\core_shared" -Destination $dest -Recurse -Force
          
          Write-Host "[INFO] Copiando Configuracion..."
          if (Test-Path ".\config") {
            Copy-Item -Path ".\config" -Destination $dest -Recurse -Force
          }
          
          Write-Host "[INFO] Copiando Requirements..."
          Copy-Item -Path ".\requirements.txt" -Destination $dest -Force
          
          Write-Host "[SUCCESS] Archivos copiados exitosamente en $dest"

      - name: Verificar Docker WSL2 (Linux containers via TCP)
        shell: powershell
        run: |
          $env:DOCKER_HOST = "tcp://localhost:2375"

          # 1. Despertar WSL2
          Write-Host "[1/3] Despertando WSL2 Ubuntu..."
          $p1 = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","echo","ok") -NoNewWindow -PassThru
          if (-not $p1.WaitForExit(30000)) { $p1.Kill() }
          Write-Host "[OK] WSL2 respondio"

          # 2. Matar socat previo (si quedo de intentos anteriores, ocupa :2375)
          Write-Host "[2/3] Limpiando socat previo..."
          $p2 = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","pkill","-9","-x","socat") -NoNewWindow -PassThru
          if (-not $p2.WaitForExit(8000)) { $p2.Kill() }
          Start-Sleep -Seconds 2

          # 3. Iniciar docker daemon.
          #    daemon.json ya tiene: "hosts": ["unix:///var/run/docker.sock", "tcp://0.0.0.0:2375"]
          #    WSL2 hace port-forwarding automatico -> localhost:2375 en Windows.
          #    NO se necesita socat.
          Write-Host "[3/3] Iniciando docker daemon..."
          $p3 = Start-Process wsl.exe -ArgumentList "-d Ubuntu -u root -- service docker start" -NoNewWindow -PassThru
          if (-not $p3.WaitForExit(30000)) { $p3.Kill(); Write-Host "[WARN] docker start timeout" }

          # 4. Esperar TCP 2375 directamente (dockerd escucha en tcp://0.0.0.0:2375)
          Write-Host "[INFO] Esperando que Docker responda en tcp://localhost:2375..."
          $ready = $false
          for ($i = 1; $i -le 30; $i++) {
            $tcp = (Test-NetConnection -ComputerName 127.0.0.1 -Port 2375 -WarningAction SilentlyContinue).TcpTestSucceeded
            if ($tcp) { Write-Host "[OK] Puerto 2375 abierto (iter $i)"; $ready = $true; break }
            Start-Sleep -Seconds 2
          }
          if (-not $ready) {
            Write-Host "[DIAG] pgrep dockerd:"
            $pD = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","pgrep","-a","dockerd") -NoNewWindow -PassThru
            $pD.WaitForExit(5000)
            Write-Host "[DIAG] tail docker.log:"
            $pL = Start-Process wsl.exe -ArgumentList "-d Ubuntu -u root -- tail -20 /var/log/docker.log" -NoNewWindow -PassThru
            $pL.WaitForExit(5000)
            Write-Error "[ERROR] Docker no accesible en tcp://localhost:2375 tras 60s"; exit 1
          }
          $version = cmd /c "docker version --format {{.Server.Version}} 2>NUL"
          Write-Host "[OK] Docker Engine WSL2 Linux: $version"

      - name: Deploy GSP Bot v5 (docker compose up --build)
        shell: powershell
        env:
          DOCKER_HOST: "tcp://localhost:2375"
          GSP_USER_CODE: ${{ secrets.GSP_USER_CODE }}
          GSP_PASSWORD: ${{ secrets.GSP_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FLOWER_BASIC_AUTH: ${{ secrets.FLOWER_BASIC_AUTH }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        working-directory: rpa_headless_linux/gsp_v5
        run: |
          Write-Host "[INFO] Desplegando GSP Bot v5..."
          docker compose up -d --build
          Start-Sleep -Seconds 10
          docker compose ps
          Write-Host "[OK] Deploy completado."
