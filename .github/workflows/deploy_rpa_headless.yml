name: CD - Deploy RPA Headless Linux (Dev)

# ──────────────────────────────────────────────────────────
# Despliega automáticamente los cambios de rpa_headless_linux
# en la máquina 10.224.6.16 cuando se hace push a dev.
# Patrón idéntico a deploy_windows_bots.yml pero para la
# máquina de Machine Learning con Docker.
# ──────────────────────────────────────────────────────────

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'rpa_headless_linux/**'
      - 'core_shared/**'
      - 'config/**'
      - 'requirements.txt'
      - '.github/workflows/deploy_rpa_headless.yml'

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, self-hosted-ml]

    environment: Machine_Learning_10.224.6.16

    env:
      DEPLOY_PATH: ${{ vars.WIN_DEPLOY_PATH }}

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Desplegar Archivos en Servidor
        shell: powershell
        run: |
          $dest = "$env:DEPLOY_PATH"
          Write-Host "[INFO] Iniciando despliegue RPA Headless Linux en: $dest"
          
          # 1. Crear directorio base si no existe
          if (!(Test-Path -Path $dest)) { 
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Write-Host "[OK] Directorio base creado."
          }
          
          # 2. Copiar carpetas (Sobrescribiendo)
          Write-Host "[INFO] Copiando RPA Headless Linux..."
          if (Test-Path ".\rpa_headless_linux") {
              Copy-Item -Path ".\rpa_headless_linux" -Destination $dest -Recurse -Force
          }

          Write-Host "[INFO] Copiando Core Shared..."
          Copy-Item -Path ".\core_shared" -Destination $dest -Recurse -Force
          
          Write-Host "[INFO] Copiando Configuracion..."
          if (Test-Path ".\config") {
            Copy-Item -Path ".\config" -Destination $dest -Recurse -Force
          }
          
          Write-Host "[INFO] Copiando Requirements..."
          Copy-Item -Path ".\requirements.txt" -Destination $dest -Force
          
          Write-Host "[SUCCESS] Archivos copiados exitosamente en $dest"

      - name: Verificar Docker WSL2 (Linux containers via TCP)
        shell: powershell
        run: |
          # 1. Despertar WSL2
          Write-Host "[1/5] Despertando WSL2 Ubuntu..."
          $p1 = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","echo","ok") -NoNewWindow -PassThru
          if (-not $p1.WaitForExit(30000)) { $p1.Kill() }
          Write-Host "[OK] WSL2 respondio"

          # 2. Detener Windows Docker Engine (puede ocupar :2375)
          Write-Host "[2/5] Deteniendo servicio Windows Docker Engine..."
          $svc = Get-Service -Name "docker" -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -eq 'Running') {
            Stop-Service docker -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
            Write-Host "[OK] Servicio Docker Windows detenido"
          } else { Write-Host "[OK] Servicio Docker Windows no estaba corriendo" }

          # 3. Matar socat (wsl.conf boot lo inicia y ocupa :2375 antes que dockerd)
          Write-Host "[3/5] Matando socat dentro de WSL2..."
          $pk = Start-Process wsl.exe -ArgumentList @("-d","Ubuntu","-u","root","--exec","pkill","-9","socat") -NoNewWindow -PassThru
          if (-not $pk.WaitForExit(8000)) { $pk.Kill() }
          Start-Sleep -Seconds 2

          # 4. Restart docker para que rebindee tcp://0.0.0.0:2375 sin socat
          Write-Host "[4/5] Reiniciando docker daemon en WSL2..."
          $p3 = Start-Process wsl.exe -ArgumentList "-d Ubuntu -u root -- service docker restart" -NoNewWindow -PassThru
          if (-not $p3.WaitForExit(45000)) { $p3.Kill(); Write-Host "[WARN] docker restart timeout" }

          # Docker 29.x agrega ~1s de delay intencional por deprecation warning (TCP sin TLS)
          Write-Host "[5/5] Esperando deprecation delay de dockerd..."
          Start-Sleep -Seconds 5

          # 6. Obtener IP real de WSL2 (eth0, no docker0)
          $wslIp = (wsl -d Ubuntu -u root -- ip -4 addr show eth0 2>$null | Select-String 'inet (\d+\.\d+\.\d+\.\d+)').Matches.Groups[1].Value
          if (-not $wslIp) {
            # fallback: hostname -I (primer IP)
            $wslIp = (wsl -d Ubuntu -u root -- hostname -I).Trim().Split()[0]
          }
          Write-Host "[INFO] WSL2 eth0 IP: $wslIp"

          # 7. Probar conexion: primero localhost, luego IP directa de WSL2
          $dockerHost = $null
          Write-Host "[INFO] Probando tcp://localhost:2375..."
          $tcp1 = (Test-NetConnection -ComputerName 127.0.0.1 -Port 2375 -WarningAction SilentlyContinue).TcpTestSucceeded
          if ($tcp1) {
            Write-Host "[OK] localhost:2375 accesible"
            $dockerHost = "tcp://localhost:2375"
          } else {
            Write-Host "[INFO] localhost:2375 no responde. Probando tcp://${wslIp}:2375..."
            $tcp2 = (Test-NetConnection -ComputerName $wslIp -Port 2375 -WarningAction SilentlyContinue).TcpTestSucceeded
            if ($tcp2) {
              Write-Host "[OK] ${wslIp}:2375 accesible"
              $dockerHost = "tcp://${wslIp}:2375"
            }
          }

          if (-not $dockerHost) {
            Write-Host "[DIAG] pgrep dockerd:"
            wsl -d Ubuntu -u root -- pgrep -a dockerd
            Write-Host "[DIAG] ss -tlnp :2375:"
            wsl -d Ubuntu -u root -- ss -tlnp sport = :2375
            Write-Host "[DIAG] ip addr show eth0:"
            wsl -d Ubuntu -u root -- ip -4 addr show eth0
            Write-Error "[ERROR] Docker no accesible en localhost ni en $wslIp"; exit 1
          }

          # 8. Exportar DOCKER_HOST para pasos siguientes
          Write-Host "[OK] DOCKER_HOST=$dockerHost"
          echo "DOCKER_HOST=$dockerHost" >> $env:GITHUB_ENV
          $env:DOCKER_HOST = $dockerHost

          $version = cmd /c "docker version --format {{.Server.Version}} 2>NUL"
          Write-Host "[OK] Docker Engine WSL2 Linux: $version"

      - name: Deploy GSP Bot v5 (docker compose up --build)
        shell: powershell
        env:
          # DOCKER_HOST viene de GITHUB_ENV (paso anterior lo detecta dinamicamente)
          GSP_USER_CODE: ${{ secrets.GSP_USER_CODE }}
          GSP_PASSWORD: ${{ secrets.GSP_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FLOWER_BASIC_AUTH: ${{ secrets.FLOWER_BASIC_AUTH }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        working-directory: rpa_headless_linux/gsp_v5
        run: |
          Write-Host "[INFO] Desplegando GSP Bot v5..."
          docker compose up -d --build
          Start-Sleep -Seconds 10
          docker compose ps
          Write-Host "[OK] Deploy completado."
